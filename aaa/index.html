<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça seu Gás - Copagaz</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @font-face {
            font-family: 'GTAmerica';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Compressed-Medium.otf') format('opentype');
        }

        @font-face {
            font-family: 'GTAmericaRegular';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Standard-Regular.otf') format('opentype');
        }

        body {
            min-height: 100vh;
            background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundo.jpg');
            background-repeat: no-repeat;
            background-color: #243836;
            background-position: top center;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'GTAmericaRegular', sans-serif;
        }

        /* Estilização da Seção de Produto */
        .product-card {
            background: rgba(36, 56, 54, 0.85); /* Tom sobre tom com o fundo original */
            border: 2px solid #e48030;
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-top: 40px;
        }

        .product-title {
            font-family: 'GTAmerica', sans-serif;
            color: #e48030;
            font-size: 2.8rem;
            text-transform: uppercase;
            line-height: 1;
        }

        .product-subtitle {
            color: #f0b03d;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .price-tag {
            color: #fff;
            font-size: 1rem;
        }

        .price-value {
            color: #f0b03d;
            font-size: 3.5rem;
            font-weight: 900;
            font-family: 'GTAmerica', sans-serif;
            display: block;
            line-height: 0.8;
            margin-bottom: 20px;
        }

        .product-img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        .product-img:hover {
            transform: scale(1.05);
        }

        /* Formulário e Botão */
        .form-control-cep {
            border-radius: 50px;
            padding: 12px 25px;
            border: 2px solid #f0b03d;
            background: transparent;
            color: white !important;
            font-size: 1.1rem;
        }

        .form-control-cep::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .btn-checkout {
            background-color: #ff8a30;
            color: white;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.3rem;
            text-decoration: none;
            display: block;
            width: 100%;
            border: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 138, 48, 0.4);
        }

        .btn-checkout:hover {
            background-color: #e48030;
            transform: translateY(-2px);
            color: white;
        }

        .badge-entrega {
            background: #f0b03d;
            color: #243836;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Ajustes Responsivos */
        @media (max-width: 991.98px) {
            body {
                background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundoMobile.jpg');
            }
            .product-card {
                margin: 20px 10px;
                padding: 20px;
            }
            .product-title { font-size: 2.2rem; }
            .price-value { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-lg-10">
                
                <div class="product-card">
                    <div class="row align-items-center">
                        
                        <div class="col-md-5 text-center mb-4 mb-md-0">
                            <img src="https://cdn-icons-png.flaticon.com/512/3251/3251147.png" alt="Botijão P13" class="product-img">
                            </div>

                        <div class="col-md-7">
                            <div class="badge-entrega"><i class="bi bi-truck"></i> ENTREGA RÁPIDA NA SUA REGIÃO</div>
                            <h1 class="product-title">Botijão de Gás 13kg</h1>
                            <p class="product-subtitle">Cheio (P13) - Padrão Residencial</p>
                            
                            <div class="price-container">
                                <span class="price-tag">Por apenas:</span>
                                <span class="price-value">R$ 89,47</span>
                            </div>

                            <form action="#" class="mt-4">
                                <div class="row g-2">
                                    <div class="col-sm-7">
                                        <input type="text" class="form-control form-control-cep" placeholder="Digite seu CEP (00000-000)" required>
                                    </div>
                                    <div class="col-sm-5">
                                        <button type="submit" class="btn-checkout">
                                            COMPRAR <i class="bi bi-cart-fill ms-2"></i>
                                        </button>
                                    </div>
                                </div>
                                <p style="font-size: 0.8rem; color: #f0b03d; margin-top: 10px;" class="text-center text-sm-start">
                                    <i class="bi bi-shield-check"></i> Pagamento seguro na entrega.
                                </p>
                            </form>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
