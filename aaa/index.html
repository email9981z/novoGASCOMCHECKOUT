<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botijão P13 - Copagaz | Peça Agora</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @font-face {
            font-family: 'GTAmerica';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Compressed-Medium.otf') format('opentype');
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
        }

        body {
            background-color: #243836;
            background-image: linear-gradient(180deg, rgba(36,56,54,0.9) 0%, #243836 100%), url('https://www2.copagaz.com.br/chamanozap/img/fundo.jpg');
            background-attachment: fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Ajuste do Header */
        .navbar-brand img {
            height: 40px;
        }

        /* Estrutura Principal */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 20px 0;
        }

        .product-image-wrapper img {
            max-width: 100%;
            height: auto;
            max-height: 350px; /* Limita altura no desktop */
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
        }

        h1.display-title {
            font-family: 'GTAmerica', sans-serif;
            font-size: 3.5rem;
            color: #e48030;
            text-transform: uppercase;
            line-height: 0.9;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #f0b03d;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .price-value {
            font-family: 'GTAmerica', sans-serif;
            font-size: 4.5rem;
            color: #f0b03d;
            line-height: 1;
        }

        /* Card de Conversão */
        .conversion-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
        }

        .form-control-custom {
            background: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1rem;
        }

        .btn-order {
            background: #ff8a30;
            border: none;
            padding: 12px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            text-transform: uppercase;
            transition: 0.3s;
        }

        /* --- AJUSTES MOBILE (FOCO NO ACESSO IMEDIATO) --- */
        @media (max-width: 767.98px) {
            .navbar { padding: 5px 0; }
            .navbar-brand img { height: 30px; }
            
            .main-content { 
                padding: 10px 0;
                align-items: flex-start; /* Sobe o conteúdo */
            }

            .product-image-wrapper img {
                max-height: 180px; /* Reduz imagem no mobile para sobrar espaço */
                margin-bottom: 10px;
            }

            h1.display-title { 
                font-size: 1.8rem; 
                text-align: center;
            }

            .subtitle { 
                font-size: 1rem; 
                text-align: center; 
                margin-bottom: 10px;
            }

            .price-box { 
                text-align: center; 
                margin: 10px 0 !important;
            }

            .price-value { font-size: 3rem; }

            .conversion-card {
                padding: 15px;
                margin-top: 5px;
            }

            .btn-order { padding: 10px; font-size: 1rem; }

            footer { padding: 15px 0; }
            .phone-footer { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container justify-content-center">
            <a class="navbar-brand" href="#">
                <img src="https://www.copagaz.com.br/wp-content/themes/copagaz/assets/images/logo-copagaz.svg" alt="Copagaz">
            </a>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="row align-items-center">
                
                <div class="col-lg-6 product-image-wrapper text-center mb-3 mb-lg-0">
                    <img src="https://i.postimg.cc/bNrFp7fR/1000310540_removebg_preview.png" alt="Botijão Copagaz P13">
                </div>

                <div class="col-lg-6">
                    <div class="text-center text-lg-start">
                        <h1 class="display-title">Botijão de Gás P13</h1>
                        <p class="subtitle">13 Kilos - Padrão Residencial</p>
                    </div>

                    <div class="conversion-card">
                        <div class="price-box text-center text-lg-start mb-3">
                            <span class="d-block opacity-75">Valor total com entrega:</span>
                            <span class="price-value">R$ 89,47</span>
                        </div>

                        <form action="#">
                            <div class="row g-2">
                                <div class="col-12 col-md-7">
                                    <input type="text" class="form-control form-control-custom text-center text-lg-start" placeholder="Digite seu CEP" required>
                                </div>
                                <div class="col-12 col-md-5">
                                    <button type="submit" class="btn-order">
                                        PEDIR AGORA
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="text-center">
        <div class="container">
            <a href="tel:08007072672" class="phone-footer text-decoration-none">
                <i class="bi bi-telephone-fill small"></i> 0800-707-2672
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
