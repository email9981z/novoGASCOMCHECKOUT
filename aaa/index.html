
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamentos</title>
    
    <!-- Bootstrap CSS via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Fontes originais via link direto */
        @font-face {
            font-family: 'GTAmerica';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Compressed-Medium.otf') format('opentype');
        }

        @font-face {
            font-family: 'GTAmericaRegular';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Standard-Regular.otf') format('opentype');
        }

        body {
            height: 115vh;
            background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundo.jpg');
            background-repeat: no-repeat;
            background-color: #243836;
            background-position: top;
            margin: 0;
            padding: 0;
        }

        h1 {
            font-family: 'GTAmerica', sans-serif;
            font-size: 7.5em;
            line-height: 1.1;
            color: #e48030; 
            text-transform: uppercase; 
            margin-top: 50px;
        }

        h3 {
            margin-left: 15px; 
            font-size: 2.5em;
            color: #f0b03d;
            font-weight: bold;
        }

        p {
            font-family: 'GTAmericaRegular', sans-serif;
            line-height: 1.2;
            font-size: 2.0em;
            color: #f0b03d;
        }

        span {
            color: #f0b03d;
            text-decoration: underline; 
            font-weight: bold;
        }

        .span2 {
            color: #ff8a30; 
            font-weight: bold; 
            text-decoration: none !important;
        }

        .margemlateral {
            margin-left: 60px;
        }

        a.btn-whatsapp {
            background-color: #ff8a30; 
            width: 300px;
            color: white;
            font-weight: bold;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 50px;
            font-size: 2rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        a.btn-whatsapp:hover {
            background-color: #e48030;
            color: white;
        }

        /* Responsividade */
        @media (max-width: 991.98px) { 
            body {
                background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundoMobile.jpg');
                background-position: bottom; 
                height: 1080px;           
            }

            h1 {
                padding-top: 100px; 
                font-size: 2.5em; 
                text-align: center;
                margin-top: 50px !important;
            }

            p.fonteMobile {
                font-size: 18px !important; 
                margin-top: 10px !important; 
                text-align: center !important;
            }

            a.btn-whatsapp {
                width: 200px; 
                font-size: 20px !important; 
                margin: 0 auto; 
                display: block;
            }

            h3 {
                text-align: center; 
                margin-top: 30px !important; 
                font-size: 45px;
                margin-left: 0;
            }

            .margemlateral {
                margin-left: 0px;
            }

            .topo {
                margin-top: 40px !important;
            }
        }

        @media (max-width: 430px) {
            p.fonteMobile {
                font-size: 1.0em !important;
            }
            h3 {
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row mt-3 topo">
            <div class="col margemlateral">
                <h1 class="text-left mb-5">
                    Copagaz no Zap.<br>
                    <span> Chamou, <br> pediu, chegou.</span> 
                </h1>

                <p class="text-left fonteMobile mt-5 mb-5">
                    Agora você consegue pedir <br> um botijão Copagaz sem sair <br>
                    do seu Whatsapp.<br> <span class="span2" style="font-weight: bold !important;">É fácil, seguro e super prático.</span> <br>
                    Clique no botão abaixo<br> e adicione o nosso contato!
                </p>

                <!-- Link do WhatsApp com mensagem personalizada e quebras de linha -->
                <a class="btn-whatsapp" href="https://wa.me/5511952810625?text=Ol%C3%A1%2C%20gostaria%20de%20fazer%20um%20pedido.%0A%0ATipo%20de%20G%C3%A1s%3A%0AEndere%C3%A7o%20de%20Entrega%3A" target="_blank" role="button">
                    <i class="bi bi-whatsapp"></i> PEDIR AGORA
                </a>
                
                <h3 class="fw-bold">0800-707-2672</h3>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
