<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copagaz - Pedido Rápido</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @font-face {
            font-family: 'GTAmerica';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Compressed-Medium.otf') format('opentype');
        }

        @font-face {
            font-family: 'GTAmericaRegular';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Standard-Regular.otf') format('opentype');
        }

        body {
            min-height: 100vh;
            background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundo.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-color: #243836;
            background-position: top center;
            margin: 0;
            padding: 0;
            font-family: 'GTAmericaRegular', sans-serif;
        }

        /* Estilos da Home Original */
        #home-content h1 {
            font-family: 'GTAmerica', sans-serif;
            font-size: clamp(3rem, 8vw, 7.5rem);
            line-height: 1.1;
            color: #e48030; 
            text-transform: uppercase; 
            margin-top: 50px;
        }

        #home-content h1 span { color: #f0b03d; text-decoration: underline; }

        #home-content p { font-size: 1.8rem; color: #f0b03d; }

        .btn-whatsapp {
            background-color: #ff8a30; 
            width: 100%;
            max-width: 350px;
            color: white;
            font-weight: bold;
            padding: 1.2rem;
            border-radius: 50px;
            font-size: 1.8rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border: none;
            transition: transform 0.2s;
        }

        .btn-whatsapp:hover { background-color: #e48030; color: white; transform: scale(1.02); }

        /* Estilos do Formulário de Entrega */
        .checkout-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-top: 40px;
            display: none; /* Escondido inicialmente */
        }

        .product-img {
            max-width: 180px;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.2));
        }

        .price-tag {
            font-size: 2.5rem;
            font-weight: 900;
            color: #243836;
            font-family: 'GTAmerica', sans-serif;
        }

        .form-label { font-weight: bold; color: #444; margin-bottom: 2px; font-size: 0.9rem; }

        .form-control {
            border-radius: 8px;
            padding: 10px;
            border: 2px solid #eee;
        }

        .form-control:focus { border-color: #ff8a30; box-shadow: none; }

        .btn-finalizar {
            background-color: #28a745;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 20px;
        }

        @media (max-width: 991.98px) {
            body { background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundoMobile.jpg'); }
            #home-content { text-align: center; }
            .checkout-card { margin: 20px 10px; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10" id="main-content">
                
                <div id="home-content">
                    <h1 class="mb-4">
                        Copagaz no Zap.<br>
                        <span> Chamou, <br> pediu, chegou.</span> 
                    </h1>

                    <p class="mt-4 mb-5">
                        Agora você consegue pedir um botijão Copagaz sem sair do seu Whatsapp.<br> 
                        <strong style="color: #ff8a30;">É fácil, seguro e super prático.</strong>
                    </p>

                    <button onclick="exibirFormulario()" class="btn-whatsapp mb-4">
                        <i class="bi bi-cart-fill"></i> PEDIR AGORA
                    </button>
                    
                    <h3 style="color: #f0b03d; font-weight: bold;">0800-707-2672</h3>
                </div>

                <div id="checkout-form" class="checkout-card">
                    <div class="row align-items-center">
                        <div class="col-md-5 text-center mb-4 mb-md-0">
                            <img src="https://www.copagaz.com.br/wp-content/uploads/2021/04/botijao-p13.png" alt="Botijão P13" class="product-img mb-3">
                            <h2 style="font-family: 'GTAmerica'; color: #e48030;">BOTIJÃO DE GÁS 13KG</h2>
                            <p class="text-muted mb-0" style="font-size: 1.1rem;">Cheio (P13) - Padrão Residencial</p>
                            <div class="price-tag">R$ 89,47</div>
                        </div>

                        <div class="col-md-7 border-start-md">
                            <h4 class="mb-4 fw-bold"><i class="bi bi-geo-alt-fill text-danger"></i> Onde entregamos?</h4>
                            <form id="entregaZap">
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label">Nome Completo</label>
                                        <input type="text" class="form-control" placeholder="Quem vai receber?" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">CEP</label>
                                        <input type="text" class="form-control" id="cep" placeholder="00000-000" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">Número</label>
                                        <input type="text" class="form-control" placeholder="Ex: 123" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Complemento / Referência</label>
                                        <input type="text" class="form-control" placeholder="Apto, Bloco, Travessa...">
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn-finalizar">
                                            CONCLUIR NO WHATSAPP <i class="bi bi-whatsapp ms-2"></i>
                                        </button>
                                        <button type="button" onclick="location.reload()" class="btn btn-link btn-sm text-muted w-100 mt-2">Voltar</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function exibirFormulario() {
            // Esconde o conteúdo inicial com animação simples
            document.getElementById('home-content').style.display = 'none';
            
            // Exibe o formulário
            const form = document.getElementById('checkout-form');
            form.style.display = 'block';
            
            // Rola para o topo do formulário no mobile
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Simulação de envio para o Zap (Opcional: Captura os dados e envia no link)
        document.getElementById('entregaZap').addEventListener('submit', function(e) {
            e.preventDefault();
            const cep = document.getElementById('cep').value;
            const msg = `Olá, gostaria de finalizar meu pedido de um P13 (R$ 89,47). Meu CEP é: ${cep}`;
            const url = `https://wa.me/5511952810625?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
