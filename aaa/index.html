<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamentos - Copagaz</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        @font-face {
            font-family: 'GTAmerica';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Compressed-Medium.otf') format('opentype');
        }

        @font-face {
            font-family: 'GTAmericaRegular';
            src: url('https://www2.copagaz.com.br/chamanozap/font/GT-America-Standard-Regular.otf') format('opentype');
        }

        body {
            background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundo.jpg');
            background-repeat: no-repeat;
            background-color: #243836;
            background-position: top;
            margin: 0;
            padding: 0;
            font-family: 'GTAmericaRegular', sans-serif;
        }

        h1 {
            font-family: 'GTAmerica', sans-serif;
            font-size: 5.5em; /* Reduzi levemente para caber o card abaixo */
            line-height: 1.1;
            color: #e48030; 
            text-transform: uppercase; 
            margin-top: 50px;
        }

        h1 span {
            color: #f0b03d;
            text-decoration: underline; 
            font-weight: bold;
        }

        h3 {
            font-size: 2.5em;
            color: #f0b03d;
            font-weight: bold;
            margin-top: 40px;
        }

        .margemlateral {
            margin-left: 60px;
        }

        /* --- NOVA SESSÃO DE PRODUTO --- */
        .product-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(240, 176, 61, 0.3);
            border-radius: 25px;
            padding: 30px;
            margin-top: 30px;
            max-width: 900px;
        }

        .product-img {
            max-width: 180px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .product-title-inner {
            font-family: 'GTAmerica', sans-serif;
            color: #fff;
            font-size: 2.2rem;
            text-transform: uppercase;
            margin: 0;
        }

        .product-subtitle-inner {
            color: #f0b03d;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .price-value {
            color: #ff8a30;
            font-size: 3.5rem;
            font-weight: bold;
            font-family: 'GTAmerica', sans-serif;
        }

        .form-cep {
            background: white;
            border-radius: 50px;
            padding: 5px 5px 5px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .form-cep input {
            border: none;
            outline: none;
            flex-grow: 1;
            font-size: 1.1rem;
        }

        .btn-comprar {
            background: #ff8a30;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-comprar:hover {
            background: #e48030;
        }

        /* Responsividade */
        @media (max-width: 991.98px) { 
            body { background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundoMobile.jpg'); }
            h1 { font-size: 2.5em; text-align: center; }
            .margemlateral { margin-left: 0; }
            .product-section { margin: 20px auto; text-align: center; }
            .form-cep { flex-direction: column; border-radius: 15px; padding: 15px; }
            .form-cep input { text-align: center; margin-bottom: 10px; width: 100%; }
            .btn-comprar { width: 100%; }
            h3 { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row mt-3">
            <div class="col margemlateral">
                <h1 class="text-left mb-4">
                    Copagaz no Zap.<br>
                    <span> Chamou, <br> pediu, chegou.</span> 
                </h1>

                <div class="product-section">
                    <div class="row align-items-center">
                        <div class="col-md-4 text-center">
                            <img src="https://www.copagaz.com.br/wp-content/uploads/2020/09/p13.png" alt="Botijão P13" class="product-img">
                        </div>
                        <div class="col-md-8">
                            <h2 class="product-title-inner">Botijão de Gás 13 Kilos</h2>
                            <p class="product-subtitle-inner">Cheio (P13) - Padrão Residencial</p>
                            
                            <div class="d-flex align-items-baseline mb-3">
                                <span style="color: #fff; margin-right: 10px;">Total:</span>
                                <span class="price-value">R$ 89,47</span>
                            </div>

                            <div class="form-cep">
                                <input type="text" placeholder="Qual seu CEP?" maxlength="9">
                                <button class="btn-comprar">PEDIR AGORA</button>
                            </div>
                        </div>
                    </div>
                </div>

                <h3 class="fw-bold">0800-707-2672</h3>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
